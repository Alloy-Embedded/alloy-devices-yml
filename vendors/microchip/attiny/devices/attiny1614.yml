      ctrla:
        offset: 0
        access: rw
      status:
        offset: 1
        access: rw
    fields:
      ctrla.period:
        bits:
        - 0
        - 3
        access: rw
        enum:
          'off': 0
          8clk: 1
          16clk: 2
          32clk: 3
          64clk: 4
          128clk: 5
          256clk: 6
          512clk: 7
          1kclk: 8
          2kclk: 9
          4kclk: 10
          8kclk: 11
      ctrla.window:
        bits:
        - 4
        - 7
        access: rw
        enum:
