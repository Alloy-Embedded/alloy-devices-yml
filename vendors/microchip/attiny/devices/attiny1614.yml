          4v34: 3
          1v5: 4
      ctrlc.adc1refsel:
        bits:
        - 4
        - 6
        access: rw
        enum:
          0v55: 0
          1v1: 1
          2v5: 2
          4v34: 3
          1v5: 4
      ctrld.dac2refsel:
