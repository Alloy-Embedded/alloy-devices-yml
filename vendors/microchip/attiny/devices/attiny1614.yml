          16clk: 2
          32clk: 3
          64clk: 4
          128clk: 5
          256clk: 6
          512clk: 7
          1kclk: 8
          2kclk: 9
          4kclk: 10
          8kclk: 11
      status.syncbusy:
        bit: 0
        access: ro
      status.lock:
        bit: 7
        access: rw
