- id: safcomm
  template: safcomm
  base: '0x40071000'
  description: This register contains one bit PREFETCH_EN that should be set to '1' during initialization, to        enable Prefetch Mode operation in SAFS Mode. Prefetch Mode allows overlapped anticipatory reading of        information from Flash during the eSPI delivery of previously-read data to the Host Chipset. If        enabled, Prefetching is invoked during consecutive Reads that are 64 bytes in length and from        consecutive 64-byte aligned Flash addresses. With roughly equal clock rates on eSPI and SPI, these        features together can approximately double the effective bandwidth of consecutive Flash reads        performed over eSPI.  In SAFS operation (SAF_MODE_ENABLE bit = 1) attempted accesses by EC firmware        to this register are blocked.
  ip_version: safcomm_1.0
