schema: alloy.device.v2.1
identity:
  vendor: espressif
  family: esp32c6
  device: esp32c6
  core:
    isa: riscv
    name: rv32imac
    bits: 32
  description: 32-bit RISC-V MCU & 2.4 GHz Wi-Fi 6 & Bluetooth 5 (LE) & IEEE 802.15.4
  package: qfn40
provenance:
  primary: cmsis-svd:esp32c6.svd
  authored: auto
  notes: SVD-extracted skeleton — memory + pinout require enrichment.
  secondary:
  - espressif-overlay:esp32c6
  - espressif-idf:components/soc/esp32c6
memory:
- id: rom
  base: '0x40000000'
  size: 320KB
  access: rx
  role: boot-rom
- id: hp_sram
  base: '0x40800000'
  size: 512KB
  access: rwx
- id: lp_sram
  base: '0x50000000'
  size: 16KB
  access: rwx
  role: rtc-slow
- id: drom
  base: '0x42000000'
  size: 16MB
  access: ro
  role: xip-flash-data
- id: irom
  base: '0x42000000'
  size: 16MB
  access: rx
  role: xip-flash-exec
clock:
  oscillators:
    xtal:
      freq: 40MHz
      kind: crystal-external
    rc_fast:
      freq: 17500kHz
      kind: rc-internal
    rc_slow:
      freq: 150kHz
      kind: rc-internal
    xtal32k:
      freq: 32768Hz
      kind: crystal-external
      optional: true
    pll_cpu:
      freq: 480MHz
      kind: synthesised
  domains:
  - id: sysclk
    sources:
    - xtal
    - rc_fast
    - pll_cpu
  - id: rtc_slow_clk
    sources:
    - rc_slow
    - xtal32k
  profiles:
  - id: post-reset-rc-fast-17mhz
    kind: post-reset
    sysclk: 17500kHz
    sysclk_source: rc_fast
    hclk_hz: 17500000
    pclk_hz: 17500000
  - id: xtal-40mhz
    kind: recommended
    sysclk: 40MHz
    sysclk_source: xtal
    hclk_hz: 40000000
    pclk_hz: 40000000
  - id: pll-cpu-80mhz
    kind: recommended
    sysclk: 80MHz
    sysclk_source: pll_cpu
    hclk_hz: 80000000
    pclk_hz: 80000000
  - id: pll-cpu-160mhz-max
    kind: recommended
    sysclk: 160MHz
    sysclk_source: pll_cpu
    hclk_hz: 160000000
    pclk_hz: 80000000
