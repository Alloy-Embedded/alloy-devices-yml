clock:
  oscillators:
    xtal:
      freq: 40MHz
      kind: crystal-external
    rc_fast:
      freq: 17500kHz
      kind: rc-internal
    rc_slow:
      freq: 90kHz
      kind: rc-internal
    xtal32k:
      freq: 32768Hz
      kind: crystal-external
      optional: true
    pll_cpu:
      freq: 480MHz
      kind: synthesised
  domains:
  - id: sysclk
    sources:
    - xtal
    - rc_fast
    - pll_cpu
  - id: rtc_slow_clk
    sources:
    - rc_slow
    - xtal32k
  profiles:
  - id: post-reset-rc-fast-17mhz
    kind: post-reset
    sysclk: 17500kHz
    sysclk_source: rc_fast
    hclk_hz: 17500000
    pclk_hz: 17500000
  - id: xtal-40mhz
    kind: recommended
    sysclk: 40MHz
    sysclk_source: xtal
    hclk_hz: 40000000
    pclk_hz: 40000000
  - id: pll-cpu-80mhz
    kind: recommended
    sysclk: 80MHz
    sysclk_source: pll_cpu
    hclk_hz: 80000000
    pclk_hz: 80000000
  - id: pll-cpu-160mhz
    kind: recommended
    sysclk: 160MHz
    sysclk_source: pll_cpu
    hclk_hz: 160000000
    pclk_hz: 80000000
  - id: pll-cpu-240mhz-max
