  sleep_modes:
  - active
- id: modem-sleep
  description: CPU on, Wi-Fi/BT MAC + baseband off
  sleep_modes:
  - modem-sleep
- id: light-sleep
  description: CPU + RAM retained, peripherals + radios off
  sleep_modes:
  - light-sleep
- id: deep-sleep
  description: RTC + ULP only; main CPU + RAM powered down
  peripherals:
  - rtc_gpio
  - rtc_io
  - rtc_cntl
  - ulp
  sleep_modes:
  - deep-sleep
  - hibernation
