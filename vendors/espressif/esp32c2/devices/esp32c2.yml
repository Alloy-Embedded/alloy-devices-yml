schema: alloy.device.v2.1
identity:
  vendor: espressif
  family: esp32c2
  device: esp32c2
  core:
    isa: riscv
    name: rv32imc
    bits: 32
  description: 32-bit RISC-V MCU & 2.4 GHz Wi-Fi & Bluetooth 5 (LE)
  package: qfn32
provenance:
  primary: cmsis-svd:esp32c2.svd
  authored: auto
  notes: SVD-extracted skeleton — memory + pinout require enrichment.
  secondary:
  - espressif-overlay:esp32c2
  - espressif-idf:components/soc/esp32c2
memory:
- id: rom
  base: '0x40000000'
  size: 256KB
  access: rx
  role: boot-rom
- id: sram
  base: '0x3FCA0000'
  size: 272KB
  access: rwx
- id: drom
  base: '0x3C000000'
  size: 4MB
  access: ro
  role: xip-flash-data
- id: irom
  base: '0x42000000'
  size: 4MB
  access: rx
  role: xip-flash-exec
clock:
  oscillators:
    xtal:
      freq: 26MHz
      kind: crystal-external
    rc_fast:
      freq: 17500kHz
      kind: rc-internal
    rc_slow:
      freq: 150kHz
      kind: rc-internal
    pll_cpu:
      freq: 480MHz
      kind: synthesised
  domains:
  - id: sysclk
    sources:
    - xtal
    - rc_fast
    - pll_cpu
  - id: rtc_slow_clk
    sources:
    - rc_slow
  profiles:
  - id: post-reset-rc-fast-17mhz
    kind: post-reset
    sysclk: 17500kHz
    sysclk_source: rc_fast
    hclk_hz: 17500000
    pclk_hz: 17500000
  - id: xtal-26mhz
    kind: recommended
    sysclk: 26MHz
    sysclk_source: xtal
    hclk_hz: 26000000
    pclk_hz: 26000000
  - id: pll-cpu-80mhz
    kind: recommended
    sysclk: 80MHz
    sysclk_source: pll_cpu
    hclk_hz: 80000000
    pclk_hz: 80000000
  - id: pll-cpu-120mhz-max
    kind: recommended
    sysclk: 120MHz
    sysclk_source: pll_cpu
    hclk_hz: 120000000
    pclk_hz: 80000000
