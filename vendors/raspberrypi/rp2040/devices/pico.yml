schema: alloy.device.v2.1
identity:
  vendor: raspberrypi
  family: rp2040
  device: pico
  core:
    isa: unknown
    name: cortex-m0plus-dual
    bits: 32
    interrupt_lines: 22
  package: pico
  description: Raspberry Pi Pico development board (RP2040 SoC, 2 MB QSPI flash, onboard LED on GP25).
provenance:
  primary: pico-sdk:rp2040.svd
  authored: auto+hand
  secondary:
  - raspberrypi-rp2040-family-bootstrap-v1
  - raspberrypi-pico-bootstrap
  notes: Converted from canonical-v1 by scripts/convert_v1_to_v2_1.py
memory:
- id: sram
  base: '0x20000000'
  size: 264KB
  access: rwx
- id: xip_flash
  base: '0x10000000'
  size: 2MB
  access: rx
clock:
  oscillators:
    clk-sys:
      freq: 0Hz
      kind: rc-internal
    rosc:
      freq: 0Hz
      kind: rc-internal
    xosc:
      freq: 0Hz
      kind: crystal-external
  domains:
  - id: sysclk
    sources:
    - clk-sys
    - rosc
    - xosc
  - id: clk_ref_src
    sources:
    - rosc
    - xosc
    select_register:
      reg: CLOCKS_CLK_REF_CTRL
      field: SRC
      encoding:
        rosc: 0
        xosc: 1
  - id: clk_sys_src
    sources:
    - clk-ref
    - pll-sys
    - pll-usb
    - rosc
    - xosc
    select_register:
      reg: CLOCKS_CLK_SYS_CTRL
      field: AUXSRC
      encoding:
        clk-ref: 0
        pll-sys: 1
        pll-usb: 2
        rosc: 3
        xosc: 4
  profiles:
  - id: safe-rosc-6mhz
    kind: safe
    sysclk: 6MHz
    sysclk_source: internal-oscillator
  - id: default-pll-125mhz
    kind: post-reset
    sysclk: 125MHz
    sysclk_source: pll-external
templates:
  adc:
    options:
      resolution:
      - 12
    max_clock: 48MHz
    fields:
      cs.ainsel:
        bits:
        - 12
        - 14
      cs.en:
        bit: 0
  dma:
    registers:
      ch0_ctrl_trig:
        offset: 12
    fields:
      ch0_ctrl_trig.chain_to:
        bits:
        - 11
        - 14
      ch0_ctrl_trig.en:
        bit: 0
      ch0_ctrl_trig.treq_sel:
        bits:
        - 15
        - 20
  i2c:
    fields:
      ic_con.master_mode:
        bit: 0
  io_bank0:
    registers:
      gpio0_ctrl:
        offset: 4
    fields:
      gpio0_ctrl.funcsel:
        bits:
        - 0
        - 4
  pll_sys:
    fields:
      cs.lock:
        bit: 31
      cs.refdiv:
        bits:
        - 0
        - 5
  resets:
    fields:
      reset.adc:
        bit: 0
      reset.busctrl:
        bit: 1
      reset.dma:
        bit: 2
      reset.i2c0:
        bit: 3
      reset.i2c1:
        bit: 4
      reset.io_bank0:
        bit: 5
      reset.io_qspi:
        bit: 6
      reset.jtag:
        bit: 7
      reset.pads_bank0:
        bit: 8
      reset.pads_qspi:
        bit: 9
      reset.pio0:
        bit: 10
      reset.pio1:
        bit: 11
      reset.pll_sys:
        bit: 12
      reset.pll_usb:
        bit: 13
      reset.pwm:
        bit: 14
      reset.rtc:
        bit: 15
      reset.spi0:
        bit: 16
      reset.spi1:
        bit: 17
      reset.syscfg:
        bit: 18
      reset.sysinfo:
        bit: 19
      reset.tbman:
        bit: 20
      reset.timer:
        bit: 21
      reset.uart0:
        bit: 22
      reset.uart1:
        bit: 23
      reset.usbctrl:
        bit: 24
  spi:
    options:
      baud_prescaler:
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
    fields:
      sspcr0.dss:
        bits:
        - 0
        - 3
  uart:
    options:
      data_bits:
      - 5
      - 6
      - 7
      - 8
    max_baud: 7812500
    fields:
      uartdr.data:
        bits:
        - 0
        - 7
  usbctrl_regs:
    registers:
      main_ctrl:
        offset: 64
    fields:
      main_ctrl.controller_en:
        bit: 0
      main_ctrl.host_ndevice:
        bit: 1
  watchdog:
    fields:
      ctrl.enable:
        bit: 30
      ctrl.time:
        bits:
        - 0
        - 23
  usart:
    options:
      data_bits:
      - 5
      - 6
      - 7
      - 8
    max_baud: 7812500
