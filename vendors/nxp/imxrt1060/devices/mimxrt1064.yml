  notes: Converted from canonical-v1 by scripts/convert_v1_to_v2_1.py
memory:
- id: ocram
  base: '0x20200000'
  size: 1MB
  access: rw
- id: flash
  base: '0x70000000'
  size: 4MB
  access: ro
clock:
  oscillators:
    osc24m:
      freq: 0Hz
      kind: rc-internal
    pll3-sw-clk:
      freq: 0Hz
      kind: rc-internal
  domains:
  - id: sysclk
    sources:
    - osc24m
    - pll3-sw-clk
  - id: lpi2c_root
    sources:
    - pll3-sw-clk
    - osc24m
    select_register:
      reg: CCM_CSCDR2
      field: LPI2C_CLK_SEL
      encoding:
        pll3-sw-clk: 0
        osc24m: 1
  - id: lpspi_root
    sources:
    - pll3-sw-clk
    - osc24m
    select_register:
      reg: CCM_CBCMR
      field: LPSPI_CLK_SEL
      encoding:
        pll3-sw-clk: 0
        osc24m: 1
  - id: lpuart_root
    sources:
    - pll3-sw-clk
    - osc24m
    select_register:
      reg: CCM_CSCDR1
      field: UART_CLK_SEL
      encoding:
        pll3-sw-clk: 0
        osc24m: 1
  profiles:
  - id: safe-osc24m
    kind: safe
    sysclk: 24MHz
    sysclk_source: external-oscillator
  - id: default-arm-pll-600mhz
    kind: post-reset
    sysclk: 600MHz
    sysclk_source: pll-external
