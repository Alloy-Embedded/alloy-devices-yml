schema: alloy.device.v2.1
identity:
  vendor: nxp
  family: imxrt1060
  device: mimxrt1064
  core:
    isa: armv7e-m
    name: cortex-m7f
    bits: 32
    fpu: true
    mpu: true
    interrupt_lines: 4
  package: bga196
  description: NXP MIMXRT1064DVL6A i.MX RT1060 Crossover MCU with 1 MB OCRAM and 4 MB on-chip flash.
provenance:
  primary: nxp-mcux-sdk:devices/MIMXRT1064/drivers/fsl_iomuxc.h
  authored: auto+hand
  secondary:
