schema: alloy.device.v2.1
identity:
  vendor: st
  family: stm32g4
  device: stm32g474pbix
  core:
    isa: armv7e-m
    name: cm4
    bits: 32
    mpu: true
    nvic_priority_bits: 4
  description: STM32G474xx
  package: ufbga121
provenance:
  primary: cmsis-svd:STM32G474xx.svd
  authored: auto
  notes: SVD-extracted skeleton — memory + pinout require enrichment.
  secondary:
  - stm32-open-pin-data:STM32G474P(B-C-E)Ix.xml
  - stm32-overlay:stm32g4
  - stm32-tier:stm32g474pbix
