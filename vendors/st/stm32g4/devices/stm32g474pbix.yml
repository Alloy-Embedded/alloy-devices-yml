  base: '0x8000000'
  size: 512KB
  access: rx
  alias: code
- id: sram1
  base: '0x20000000'
  size: 80KB
  access: rwx
  alias: data
- id: ccmsram
  base: '0x10000000'
  size: 16KB
  access: rwx
  role: ccm
- id: sram2
  base: '0x20018000'
  size: 16KB
  access: rwx
  alias: data
clock:
