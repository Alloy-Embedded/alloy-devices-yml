      field: PLLSRC
      encoding:
        hsi: 2
        hse: 3
  - id: pllm
    source: pll_main
  - id: hsertcdevisor
    source: hse
  - id: rtcclk_source
    sources:
    - hse_rtc
    - lse
    - lsi
