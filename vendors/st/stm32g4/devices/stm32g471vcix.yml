    hsi:
      freq: 16MHz
      kind: rc-internal
    hsi48rc:
      freq: 0Hz
      kind: rc-internal
    lsi:
      freq: 32kHz
      kind: rc-internal
  domains:
  - id: sysclk_source
    sources:
    - hsi
    - hse
    - pllclk
  - id: pll_source
    sources:
    - hsi
    - hse
