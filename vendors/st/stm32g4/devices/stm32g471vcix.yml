schema: alloy.device.v2.1
identity:
  vendor: st
  family: stm32g4
  device: stm32g471vcix
  core:
    isa: armv7e-m
    name: cm4
    bits: 32
    mpu: true
    nvic_priority_bits: 4
  description: STM32G471xx
  package: ufbga100
provenance:
  primary: cmsis-svd:STM32G471xx.svd
  authored: auto
  notes: SVD-extracted skeleton — memory + pinout require enrichment.
  secondary:
  - stm32-open-pin-data:STM32G471V(C-E)Ix.xml
  - stm32-overlay:stm32g4
  - stm32-tier:stm32g471vcix
  - stm32-cubemx:STM32G471V(C-E)Ix.xml
memory:
- id: flash
  base: '0x8000000'
  size: 512KB
  access: rx
  alias: code
- id: sram1
  base: '0x20000000'
  size: 80KB
  access: rwx
  alias: data
- id: ccmsram
  base: '0x10000000'
  size: 16KB
  access: rwx
  role: ccm
- id: sram2
  base: '0x20018000'
  size: 16KB
  access: rwx
  alias: data
clock:
