  register_name: LPUART_CR3
  field_name: DDRE
  name: B_0x1
  raw_value: 1
  description: DMA is disabled following a reception error. The corresponding error flag is set, as well as RXNE. The DMA request is masked until the error flag is cleared. This means that the software must first disable the DMA request (DMAR = 0) or clear RXNE before clearing the error flag.
  usage: read-write
  provenance:
    source_id: cmsis-svd
    source_path: STM32G0B1.svd
    patch_ids: []
