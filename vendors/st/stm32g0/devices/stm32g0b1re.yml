  field_name: OC1M1
  name: B_0x6
  raw_value: 6
  description: PWM mode 1 - In upcounting, channel 1 is active as long as TIMx_CNT<TIMx_CCR1 else inactive. In downcounting, channel 1 is inactive (OC1REF='0) as long as TIMx_CNT>TIMx_CCR1 else active (OC1REF=1).
  usage: read-write
  provenance:
    source_id: cmsis-svd
    source_path: STM32G0B1.svd
