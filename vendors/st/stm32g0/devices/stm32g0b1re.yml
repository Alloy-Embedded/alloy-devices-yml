  register_name: LPUART_CR3
  field_name: DDRE
  name: B_0x0
  raw_value: 0
  description: DMA is not disabled in case of reception error. The corresponding error flag is set but RXNE is kept 0 preventing from overrun. As a consequence, the DMA request is not asserted, so the erroneous data is not transferred (no DMA request), but next correct received data is transferred.
  usage: read-write
  provenance:
    source_id: cmsis-svd
    source_path: STM32G0B1.svd
    patch_ids: []
