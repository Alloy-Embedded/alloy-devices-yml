  peripheral: TIM3
  register_name: CCMR1_Output
  field_name: OC1M1
  name: B_0x7
  raw_value: 7
  description: PWM mode 2 - In upcounting, channel 1 is inactive as long as TIMx_CNT<TIMx_CCR1 else active. In downcounting, channel 1 is active as long as TIMx_CNT>TIMx_CCR1 else inactive.
  usage: read-write
  provenance:
    source_id: cmsis-svd
    source_path: STM32G0B1.svd
    patch_ids: []
- field_id: field:tim3:ccmr1_output:oc1m1
  peripheral: TIM3
  register_name: CCMR1_Output
  field_name: OC1M1
  name: B_0x8
  raw_value: 8
  description: Retriggerable OPM mode 1 - In up-counting mode, the channel is active until a trigger event is detected (on TRGI signal). Then, a comparison is performed as in PWM mode 1 and the channels becomes inactive again at the next update. In down-counting mode, the channel is inactive until a trigger event is detected (on TRGI signal). Then, a comparison is performed as in PWM mode 1 and the channels becomes inactive again at the next update.
  usage: read-write
  provenance:
    source_id: cmsis-svd
    source_path: STM32G0B1.svd
    patch_ids: []
- field_id: field:tim3:ccmr1_output:oc1m1
  peripheral: TIM3
  register_name: CCMR1_Output
  field_name: OC1M1
  name: B_0x9
  raw_value: 9
  description: Retriggerable OPM mode 2 - In up-counting mode, the channel is inactive until a trigger event is detected (on TRGI signal). Then, a comparison is performed as in PWM mode 2 and the channels becomes inactive again at the next update. In down-counting mode, the channel is active until a trigger event is detected (on TRGI signal). Then, a comparison is performed as in PWM mode 1 and the channels becomes active again at the next update.
  usage: read-write
  provenance:
    source_id: cmsis-svd
    source_path: STM32G0B1.svd
    patch_ids: []
