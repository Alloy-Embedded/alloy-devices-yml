  field_name: LOCK
  name: B_0x1
  raw_value: 1
  description: LOCK Level 1 = DTG bits in TIMx_BDTR register, OISx and OISxN bits in TIMx_CR2 register and BK2BID, BKBID, BK2DSRM, BKDSRM, BK2P, BK2E, BK2F[3:0], BKF[3:0], AOE, BKP, BKE, OSSI, OSSR and DTG[7:0] bits in TIMx_BDTR register can no longer be written.
  usage: read-write
  provenance:
    source_id: cmsis-svd
    source_path: STM32G0B1.svd
    patch_ids: []
