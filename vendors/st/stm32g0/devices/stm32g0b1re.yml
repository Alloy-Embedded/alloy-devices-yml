  peripheral: TIM1
  register_name: TIM1_CR2
  field_name: MMS
  name: B_0x0
  raw_value: 0
  description: Reset - the UG bit from the TIMx_EGR register is used as trigger output (TRGO). If the reset is generated by the trigger input (slave mode controller configured in reset mode) then the signal on TRGO is delayed compared to the actual reset.
  usage: read-write
  provenance:
    source_id: cmsis-svd
    source_path: STM32G0B1.svd
    patch_ids: []
- field_id: field:tim1:tim1_cr2:mms
  peripheral: TIM1
  register_name: TIM1_CR2
  field_name: MMS
  name: B_0x1
  raw_value: 1
  description: Enable - the Counter Enable signal CNT_EN is used as trigger output (TRGO). It is useful to start several timers at the same time or to control a window in which a slave timer is enable. The Counter Enable signal is generated by a logic AND between CEN control bit and the trigger input when configured in gated mode. When the Counter Enable signal is controlled by the trigger input, there is a delay on TRGO, except if the master/slave mode is selected (see the MSM bit description in TIMx_SMCR register).
  usage: read-write
  provenance:
    source_id: cmsis-svd
    source_path: STM32G0B1.svd
    patch_ids: []
