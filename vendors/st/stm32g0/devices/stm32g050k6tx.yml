    source: hsi
    prescalers:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 64
    - 128
    prescaler_register:
      reg: RCC.CR
      field: HSIDIV
      encoding:
        '1': 0
        '2': 1
        '4': 2
        '8': 3
        '16': 4
        '32': 5
        '64': 6
        '128': 7
  - id: sysclk_source
    sources:
    - lse
    - sysclk_pre
    - hse
    - pllclk
    - lsi
  - id: pll_source
    sources:
    - hsi
    - hse
    select_register:
      reg: RCC.PLLCFGR
      field: PLLSRC
      encoding:
        hsi: 2
        hse: 3
  - id: pllm
    source: pll_main
  - id: hsertcdevisor
    source: hse
  - id: rtcclk_source
    sources:
    - hse_rtc
    - lse
    - lsi
  - id: usart1mult
    sources:
    - pclk
    - sysclk
    - hsi
    - lse
    select_register:
      reg: RCC.CCIPR
      field: USART1SEL
      encoding:
        pclk: 0
        sysclk: 1
        hsi: 2
        lse: 3
  - id: usart2mult
    sources:
    - pclk
    - sysclk
    - hsi
    - lse
    select_register:
