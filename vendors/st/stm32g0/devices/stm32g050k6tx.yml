    select_register:
      reg: RCC.CFGR
      field: MCOSEL
      encoding:
        lse: 7
        lsi: 6
        hse: 4
        hsi: 3
        sysclk: 1
  - id: mcodiv
    source: mco1divinput
  - id: lscomult
    sources:
    - lsi
    - lse
  - id: ahbprescaler
    source: sysclk
    prescalers:
