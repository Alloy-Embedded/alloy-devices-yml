schema: alloy.device.v2.1
identity:
  vendor: st
  family: stm32g0
  device: stm32g050k6tx
  core:
    isa: armv6-m
    name: cm0
    bits: 32
    mpu: true
    nvic_priority_bits: 4
  description: STM32G050
  package: lqfp32
provenance:
  primary: cmsis-svd:STM32G050.svd
  authored: auto
  notes: SVD-extracted skeleton — memory + pinout require enrichment.
  secondary:
  - stm32-open-pin-data:STM32G050K6Tx.xml
  - stm32-overlay:stm32g0
  - stm32-tier:stm32g050k6tx
  - stm32-cubemx:STM32G050K6Tx.xml
memory:
- id: flash
  base: '0x8000000'
  size: 512KB
  access: rx
  alias: code
- id: sram
  base: '0x20000000'
  size: 144KB
  access: rwx
  alias: data
clock:
