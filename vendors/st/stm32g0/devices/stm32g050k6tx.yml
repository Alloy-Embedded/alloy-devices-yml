        sysclk: 1
        hsi: 2
        lse: 3
  - id: i2s1mult
    sources:
    - sysclk
    - pll_p
    - hsi
    - i2sextclock
  - id: lpuart1mult
    sources:
    - pclk
    - sysclk
    - hsi
    - lse
    select_register:
      reg: RCC.CCIPR
      field: LPUART1SEL
      encoding:
        pclk: 0
        sysclk: 1
        hsi: 2
        lse: 3
  - id: lptim1mult
    sources:
