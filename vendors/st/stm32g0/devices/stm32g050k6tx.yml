    source: vcooutput
  - id: pllq
    source: vcooutput
  - id: pllr
    source: vcooutput
  profiles:
  - id: default-hsi16-16mhz
    kind: post-reset
    sysclk: 16MHz
    sysclk_source: hsi16
    hclk_hz: 16000000
